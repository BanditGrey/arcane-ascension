<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcane Ascension</title>
  <script type="module" crossorigin src="/arcane-ascension/assets/index-CUJz2qkd.js"></script>
  <link rel="stylesheet" crossorigin href="/arcane-ascension/assets/index-veIPilHk.css">
</head>
<body>
  <div id="game-app">

    <!-- TOP BAR -->
    <div id="top-bar">
      <div class="player-info">
        <div class="avatar"></div>
        <div>
          <div class="name">Arquimago</div>
          <div class="level">Nível <span id="level">1</span></div>
        </div>
      </div>

      <div class="stats">
        <div class="stat hp">
          <span>HP</span>
          <div class="bar"><div id="hp-bar" style="width: 100%"></div></div>
          <span id="hp">120 / 120</span>
        </div>
        <div class="stat mana">
          <span>Mana</span>
          <div class="bar"><div id="mana-bar" style="width: 100%"></div></div>
          <span id="mana">220 / 220</span>
        </div>
      </div>

      <div class="currencies">
        <div class="currency gold"><span id="gold">12.4M</span></div>
        <div class="currency crystal"><span id="crystals">85.430</span></div>
        <div class="currency essence"><span id="essence">3.250</span></div>
      </div>

      <div class="top-actions">
        <button class="icon-btn">✉️</button>
        <button class="icon-btn">👥</button>
        <button class="icon-btn">🏆</button>
        <button class="icon-btn">⚙️</button>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main-content">

      <!-- LEFT PANEL: Fases / Mapa -->
      <div class="left-panel">
        <h3>Exploração</h3>
        <div id="region-list"></div>
      </div>

      <!-- CENTER: Área Principal do Jogo -->
      <div class="center-area">
        <canvas id="game-canvas" width="900" height="620"></canvas>
        
        <div class="combat-hud">
          <div id="enemy-info" style="display: none;">
            <span id="enemy-name"></span>
            <div class="bar"><div id="enemy-hp-bar"></div></div>
          </div>
        </div>
      </div>

      <!-- RIGHT PANEL: Dinâmico -->
      <div class="right-panel">
        <div id="dynamic-panel">
          <h3 id="panel-title">Informações</h3>
          <div id="panel-content">
            <p>Selecione uma região para começar.</p>
          </div>
        </div>
      </div>

    </div>

    <!-- BOTTOM NAVIGATION -->
    <div id="bottom-nav">
      <button class="nav-icon" data-panel="character">👤</button>
      <button class="nav-icon" data-panel="inventory">🎒</button>
      <button class="nav-icon" data-panel="grimoire">📖</button>
      <button class="nav-icon" data-panel="forge">🔨</button>
      <button class="nav-icon" data-panel="tower">🏰</button>
      <button class="nav-icon" data-panel="events">🎉</button>
      <button class="nav-icon" data-panel="guild">🛡️</button>
      <button class="nav-icon" data-panel="settings">⚙️</button>
    </div>

  </div>

</body>
</html>
