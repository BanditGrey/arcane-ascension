<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcane Ascension - Idle RPG</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="game-container">
    <!-- Canvas Principal -->
    <canvas id="game-canvas" width="1280" height="720"></canvas>
    
    <!-- HUD Top -->
    <div id="hud-top">
      <div class="stat">Nível <span id="level">1</span></div>
      <div class="stat">HP <span id="hp">120</span></div>
      <div class="stat">Mana <span id="mp">220</span></div>
      <div class="stat" id="appearance-bonus"></div>
    </div>

    <!-- Menu Idle Style -->
    <div id="idle-menu">
      <div class="menu-tabs">
        <button class="tab-btn active" data-tab="phases">Fases</button>
        <button class="tab-btn" data-tab="upgrades">Upgrades</button>
        <button class="tab-btn" data-tab="inventory">Inventário</button>
        <button class="tab-btn" data-tab="prestige">Prestige</button>
      </div>

      <!-- Conteúdo das abas -->
      <div id="tab-content">
        <!-- Fases -->
        <div id="tab-phases" class="tab-content active">
          <h3>Selecionar Fase</h3>
          <div id="phase-list"></div>
          <button id="retry-btn">Tentar Fase Atual Novamente</button>
        </div>

        <!-- Upgrades -->
        <div id="tab-upgrades" class="tab-content">
          <h3>Upgrades</h3>
          <p>Em breve...</p>
        </div>

        <!-- Inventário -->
        <div id="tab-inventory" class="tab-content">
          <h3>Inventário</h3>
          <div id="inventory-grid"></div>
        </div>

        <!-- Prestige -->
        <div id="tab-prestige" class="tab-content">
          <h3>Prestige</h3>
          <p>Em breve...</p>
        </div>
      </div>
    </div>

    <!-- Botão de Ataque Principal -->
    <div id="main-attack">
      <button id="attack-btn">⚔️ Atacar</button>
    </div>
  </div>

  <script type="module" src="src/main.ts"></script>
</body>
</html>
