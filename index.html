<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcane Ascension • Idle RPG</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app">

    <!-- TOP HUD -->
    <div id="top-hud">
      <div class="hud-section left">
        <div class="stat">Nível <span id="level">1</span></div>
        <div class="stat">HP <span id="hp">120</span></div>
        <div class="stat">Mana <span id="mp">220</span></div>
      </div>
      <div class="hud-section center">
        <div id="phase-name">Floresta Arcana</div>
      </div>
      <div class="hud-section right">
        <div id="appearance-bonus"></div>
      </div>
    </div>

    <!-- MAIN AREA -->
    <div id="main-area">

      <!-- LEFT PANEL: Fases + Progresso -->
      <div class="side-panel">
        <h3>Fases</h3>
        <div id="phase-list"></div>
        
        <div class="panel-section">
          <h4>Progresso da Fase</h4>
          <div class="progress-bar">
            <div id="phase-progress" style="width: 0%"></div>
          </div>
          <div id="phase-kills">0 / 10</div>
        </div>
      </div>

      <!-- CENTER: Canvas + Ação Principal -->
      <div class="center-panel">
        <canvas id="game-canvas" width="800" height="620"></canvas>
        
        <div id="main-action">
          <button id="attack-btn" class="primary-btn">⚔️ Atacar</button>
          <button id="retry-btn" class="secondary-btn">🔄 Tentar Novamente</button>
        </div>
      </div>

      <!-- RIGHT PANEL: Sistemas -->
      <div class="side-panel">
        <div class="tabs">
          <button class="tab-btn active" data-tab="upgrades">Upgrades</button>
          <button class="tab-btn" data-tab="forge">Forja</button>
          <button class="tab-btn" data-tab="prestige">Prestige</button>
        </div>

        <div id="tab-upgrades" class="tab-content active">
          <div id="upgrades-list"></div>
        </div>

        <div id="tab-forge" class="tab-content">
          <div id="forge-list"></div>
        </div>

        <div id="tab-prestige" class="tab-content">
          <button id="prestige-btn" class="primary-btn">Ascender</button>
          <div id="prestige-info"></div>
        </div>
      </div>

    </div>

    <!-- BOTTOM BAR -->
    <div id="bottom-bar">
      <button class="nav-btn">Personagem</button>
      <button class="nav-btn">Inventário</button>
      <button class="nav-btn">Grimório</button>
      <button class="nav-btn">Forja</button>
      <button class="nav-btn">Torre</button>
      <button class="nav-btn">Eventos</button>
      <button class="nav-btn">Config</button>
    </div>

  </div>

  <script type="module" src="src/main.ts"></script>
</body>
</html>
