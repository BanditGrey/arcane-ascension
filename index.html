<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcane Ascension</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="game-container">
    <!-- Canvas Principal -->
    <canvas id="game-canvas" width="1280" height="720"></canvas>
    
    <!-- HUD Overlay -->
    <div id="hud">
      <div id="player-info">
        <div class="stat">
          <span>HP: <span id="hp">100</span>/<span id="max-hp">100</span></span>
        </div>
        <div class="stat">
          <span>MP: <span id="mp">200</span>/<span id="max-mp">200</span></span>
        </div>
        <div class="stat">
          <span>Nível: <span id="level">1</span></span>
        </div>
      </div>
      
      <div id="action-bar">
        <button class="spell-btn" data-spell="fireball">🔥 Bola de Fogo</button>
        <button class="spell-btn" data-spell="icebolt">❄️ Raio de Gelo</button>
      </div>
    </div>
    
    <!-- Painéis laterais (serão expandidos) -->
    <div id="sidebar">
      <div id="inventory-panel" class="panel">
        <h3>Inventário</h3>
        <div id="inventory-grid"></div>
      </div>
    </div>
  </div>
  
  <script type="module" src="src/main.ts"></script>
</body>
</html>
